name: Release SNAPSHOT

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}
        
    - name: Configure Git
      run: |
        git config user.email "${{ github.actor }}@users.noreply.github.com"
        git config user.name "${{ github.actor }}"

    - name: Build with Maven
      run: mvn clean install --batch-mode -Dmaven.test.skip=true

    - name: Publish to GitHub Packages Apache Maven
      run: mvn --batch-mode -Dmaven.test.skip=true -DaltDeploymentRepository=github::https://maven.pkg.github.com/axonivy-market/process-analyser deploy
      env:
        GITHUB_TOKEN: ${{ github.token }}
